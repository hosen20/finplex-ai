name: finplex-ai-infra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finplex-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finplex}
      POSTGRES_USER: ${POSTGRES_USER:-finplex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finplex_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - finplex_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-finplex} -d ${POSTGRES_DB:-finplex}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: finplex-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - finplex_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: finplex-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finplex_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finplex_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - finplex_minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: finplex-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finplex-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_LOCAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: finplex-zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://finplex-kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finplex-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/docker/kafka/topics.sh:/topics.sh:ro
    entrypoint: ["/bin/bash", "/topics.sh"]

volumes:
  finplex_postgres_data:
  finplex_redis_data:
  finplex_minio_data: